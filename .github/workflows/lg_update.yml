name: Update LG EPG
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate LG EPG
        run: python lg_epg.py

      - name: Verify File Creation
        run: ls -lh lg_channels.xml || echo "FILE NOT FOUND"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Only try to add if the file exists to avoid the 128 error
          if [ -f lg_channels.xml ]; then
            git add lg_channels.xml
            git commit -m "Update LG Channels EPG" || exit 0
            git push
          else
            echo "Skipping git push: lg_channels.xml was not created."
            exit 1
          fi
